# ~/.config/yazi/yazi.toml

[mgr]
ratio = [1, 4, 3]
sort_by = "natural"
sort_sensitive = false
sort_reverse = false
sort_dir_first = true
linemode = "size"
show_hidden = true
show_symlink = true
scrolloff = 8
mouse_events = ["click", "scroll", "touch", "move", "drag"]
title_format = "Yazi: {cwd}"

[preview]
wrap = "yes"
tab_size = 2
max_width = 1200
max_height = 1800
image_delay = 50
image_filter = "lanczos3"
image_quality = 75

[opener]
edit = [
  { run = 'nvim "$@"', block = true, desc = "Neovim", for = "unix" }
]

play = [
  { run = 'mpv --force-window "$@"', orphan = true, desc = "mpv", for = "unix" }
]

open = [
  { run = 'xdg-open "$1"', orphan = true, desc = "Open", for = "linux" }
]

reveal = [
  { run = 'xdg-open "$(dirname "$1")"', orphan = true, desc = "Reveal", for = "linux" }
]

extract = [
  { run = 'ya pub extract --list "$@"', desc = "Extract here", for = "unix" }
]

[open]
prepend_rules = [
  # Text and code files -> Neovim
  { mime = "text/*", use = "edit" },
  { mime = "application/json", use = "edit" },
  { mime = "application/javascript", use = "edit" },
  { mime = "application/x-shellscript", use = "edit" },
  { mime = "application/xml", use = "edit" },
  { mime = "application/x-yaml", use = "edit" },

  # Common config/code extensions -> Neovim
  { url = "*.md", use = "edit" },
  { url = "*.txt", use = "edit" },
  { url = "*.toml", use = "edit" },
  { url = "*.yaml", use = "edit" },
  { url = "*.yml", use = "edit" },
  { url = "*.json", use = "edit" },
  { url = "*.lua", use = "edit" },
  { url = "*.rs", use = "edit" },
  { url = "*.py", use = "edit" },
  { url = "*.js", use = "edit" },
  { url = "*.ts", use = "edit" },
  { url = "*.tsx", use = "edit" },
  { url = "*.jsx", use = "edit" },
  { url = "*.html", use = "edit" },
  { url = "*.css", use = "edit" },
  { url = "*.sh", use = "edit" },
  { url = "*.bash", use = "edit" },
  { url = "*.zsh", use = "edit" },
  { url = "*.conf", use = "edit" },
  { url = "*.ini", use = "edit" },

  # Audio/video -> mpv
  { mime = "video/*", use = "play" },
  { mime = "audio/*", use = "play" },

  # Common media extensions -> mpv
  { url = "*.mp4", use = "play" },
  { url = "*.mkv", use = "play" },
  { url = "*.webm", use = "play" },
  { url = "*.mov", use = "play" },
  { url = "*.avi", use = "play" },
  { url = "*.mp3", use = "play" },
  { url = "*.flac", use = "play" },
  { url = "*.wav", use = "play" },
  { url = "*.ogg", use = "play" },
  { url = "*.m4a", use = "play" },

  # Fallback to desktop opener
  { mime = "image/*", use = "open" },
  { mime = "application/pdf", use = "open" },
]

[tasks]
file_workers = 8
plugin_workers = 8
fetch_workers = 8
preload_workers = 8
process_workers = 8
suppress_preload = false
image_alloc = 536870912
image_bound = [0, 0]
